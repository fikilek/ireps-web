name: Web Config Check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/web-config-check.yml"
      - "scripts/ci/verify-web-env.mjs"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - "src/firebase/**"
      - ".firebaserc"
      - "firebase.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/web-config-check.yml"
      - "scripts/ci/verify-web-env.mjs"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - "src/firebase/**"
      - ".firebaserc"
      - "firebase.json"

permissions:
  contents: read

jobs:
  verify-web-env:
    name: Verify DEV and TEST web config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint advisory
        continue-on-error: true
        run: npm run lint:web

      - name: Verify DEV web config
        env:
          VITE_APP_ENV: dev
          VITE_FIREBASE_API_KEY: ci-dev-api-key
          VITE_FIREBASE_AUTH_DOMAIN: ireps2.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ireps2
          VITE_FIREBASE_STORAGE_BUCKET: ireps2.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          VITE_FIREBASE_APP_ID: 1:000000000000:web:devci
          VITE_GOOGLE_MAPS_API_KEY: ci-google-maps-key
        run: |
          npm run ci:verify-web-env -- dev
          npm run build -- --mode dev

      - name: Verify TEST web config
        env:
          VITE_APP_ENV: test
          VITE_FIREBASE_API_KEY: ci-test-api-key
          VITE_FIREBASE_AUTH_DOMAIN: ireps-test.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ireps-test
          VITE_FIREBASE_STORAGE_BUCKET: ireps-test.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          VITE_FIREBASE_APP_ID: 1:000000000000:web:testci
          VITE_GOOGLE_MAPS_API_KEY: ci-google-maps-key
        run: |
          npm run ci:verify-web-env -- test
          npm run build -- --mode test
