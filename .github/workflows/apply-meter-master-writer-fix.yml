name: Apply Meter Master Writer Fix

on:
  push:
    branches:
      - fix-meter-master-writers-20260716

permissions:
  contents: write

jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix-meter-master-writers-20260716
          fetch-depth: 0

      - name: Patch canonical Meter Master writers
        shell: python
        run: |
          from pathlib import Path

          path = Path("functions/index.js")
          text = path.read_text(encoding="utf-8")

          def replace_once(old: str, new: str, label: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one match, found {count}")
              text = text.replace(old, new, 1)

          replace_once(
          '''function normalizeMeterNo(value) {
            return String(value || "")
              .replace(/\\s+/g, "")
              .trim()
              .toUpperCase();
          }
          ''',
          '''function normalizeMeterNo(value) {
            return String(value ?? "")
              .replace(/\\s+/g, "")
              .trim()
              .toUpperCase();
          }

          function isFirestoreTimestamp(value) {
            return Boolean(
              value instanceof Timestamp ||
                (value &&
                  typeof value.toDate === "function" &&
                  Number.isFinite(value.seconds)),
            );
          }

          function buildCanonicalMeterMasterDocument({
            lmPcode,
            rawMeterNo,
            normalizedMeterNo,
            meterType,
            astId = "",
            actorUid = "SYSTEM",
            actorName = "SYSTEM",
            at = Timestamp.now(),
          }) {
            const canonicalLmPcode = String(lmPcode ?? "").trim();
            const canonicalRawMeterNo = String(rawMeterNo ?? "").trim();
            const canonicalNormalizedMeterNo = normalizeMeterNo(normalizedMeterNo);
            const canonicalMeterType = String(meterType ?? "").trim().toLowerCase();
            const canonicalAstId = String(astId ?? "").trim();
            const canonicalActorUid = String(actorUid ?? "").trim() || "SYSTEM";
            const canonicalActorName = String(actorName ?? "").trim() || "SYSTEM";

            if (!canonicalLmPcode) {
              throw new Error("Meter Master lmPcode is required");
            }
            if (!canonicalRawMeterNo || !canonicalNormalizedMeterNo) {
              throw new Error("Meter Master meter number is required");
            }
            if (!['water', 'electricity'].includes(canonicalMeterType)) {
              throw new Error("Meter Master meterType must be water or electricity");
            }
            if (!isFirestoreTimestamp(at)) {
              throw new Error("Meter Master metadata timestamps must be Firestore Timestamp values");
            }

            return {
              lmPcode: canonicalLmPcode,
              meterNo: {
                raw: canonicalRawMeterNo,
                normalized: canonicalNormalizedMeterNo,
              },
              meterType: canonicalMeterType,
              customerNo: "",
              accountNo: "",
              refs: {
                asts: {
                  id: canonicalAstId,
                },
                sales: {
                  id: "",
                  provider: "",
                },
              },
              metadata: {
                createdAt: at,
                createdByUid: canonicalActorUid,
                createdByUser: canonicalActorName,
                updatedAt: at,
                updatedByUid: canonicalActorUid,
                updatedByUser: canonicalActorName,
              },
            };
          }

          function assertCanonicalMeterMasterCompatibility(
            masterData,
            { lmPcode, normalizedMeterNo, meterType },
          ) {
            const expectedLmPcode = String(lmPcode ?? "").trim();
            const expectedMeterNo = normalizeMeterNo(normalizedMeterNo);
            const expectedMeterType = String(meterType ?? "").trim().toLowerCase();

            const prohibitedRootFields = [
              "id",
              "parents",
              "status",
              "serviceProvider",
              "visibility",
            ];
            const prohibitedRootField = prohibitedRootFields.find((field) =>
              Object.prototype.hasOwnProperty.call(masterData || {}, field),
            );
            if (prohibitedRootField) {
              throw new Error(
                `Meter Master schema conflict: prohibited field ${prohibitedRootField}`,
              );
            }

            if (
              !masterData?.meterNo ||
              typeof masterData.meterNo !== "object" ||
              Array.isArray(masterData.meterNo)
            ) {
              throw new Error("Meter Master schema conflict: meterNo must be a map");
            }
            if (masterData?.refs?.premise || masterData?.refs?.trns) {
              throw new Error("Meter Master schema conflict: prohibited legacy refs");
            }

            const existingMeterNo = normalizeMeterNo(masterData?.meterNo?.normalized);
            const existingLmPcode = String(masterData?.lmPcode ?? "").trim();
            const existingMeterType = String(masterData?.meterType ?? "")
              .trim()
              .toLowerCase();

            if (!existingMeterNo || existingMeterNo !== expectedMeterNo) {
              throw new Error("Meter Master identity conflict: normalized meter number differs");
            }
            if (!existingLmPcode || existingLmPcode !== expectedLmPcode) {
              throw new Error("Meter Master identity conflict: lmPcode differs");
            }
            if (!existingMeterType || existingMeterType !== expectedMeterType) {
              throw new Error("Meter Master identity conflict: meterType differs");
            }

            if (
              typeof masterData?.customerNo !== "string" ||
              typeof masterData?.accountNo !== "string" ||
              typeof masterData?.refs?.asts?.id !== "string" ||
              typeof masterData?.refs?.sales?.id !== "string" ||
              typeof masterData?.refs?.sales?.provider !== "string"
            ) {
              throw new Error("Meter Master schema conflict: canonical string fields are required");
            }

            const metadataKeys = Object.keys(masterData?.metadata || {}).sort();
            const canonicalMetadataKeys = [
              "createdAt",
              "createdByUid",
              "createdByUser",
              "updatedAt",
              "updatedByUid",
              "updatedByUser",
            ].sort();
            if (
              metadataKeys.length !== canonicalMetadataKeys.length ||
              metadataKeys.some((key, index) => key !== canonicalMetadataKeys[index])
            ) {
              throw new Error("Meter Master schema conflict: metadata must contain exactly six fields");
            }
            if (
              !isFirestoreTimestamp(masterData?.metadata?.createdAt) ||
              !isFirestoreTimestamp(masterData?.metadata?.updatedAt)
            ) {
              throw new Error("Meter Master schema conflict: metadata timestamps are invalid");
            }
          }
          ''',
          "canonical helper block",
          )

          replace_once(
          '''    const lmPcode = accessData?.parents?.lmPcode || null;

              if (!normalizedMeterNo) {
          ''',
          '''    const lmPcode = String(accessData?.parents?.lmPcode ?? "").trim();

              if (!normalizedMeterNo) {
          ''',
          "discovery lmPcode normalization",
          )

          replace_once(
          '''    if (!premiseId) {
                logger.warn("onMeterDiscoveryCreated ---- missing premiseId", {
                  trnId,
                });
                return null;
              }

              const premiseRef = db.collection("premises").doc(premiseId);
          ''',
          '''    if (!premiseId) {
                logger.warn("onMeterDiscoveryCreated ---- missing premiseId", {
                  trnId,
                });
                return null;
              }

              if (!lmPcode) {
                logger.error("onMeterDiscoveryCreated ---- missing lmPcode", {
                  trnId,
                });
                return null;
              }

              const premiseRef = db.collection("premises").doc(premiseId);
          ''',
          "discovery lmPcode validation",
          )

          replace_once(
          '''    const agentUid = updatedByUid;
              const agentName = updatedByUser;
              const validationError = validateMeterCreationPayload({
          ''',
          '''    const agentUid = updatedByUid;
              const agentName = updatedByUser;
              const meterMasterAt = Timestamp.now();
              const validationError = validateMeterCreationPayload({
          ''',
          "discovery meter master timestamp",
          )

          replace_once(
          '''        const serviceProvider = trnData?.serviceProvider || {
                  id: "NAv",
                  name: "NAv",
                };

                const nextMasterData = masterSnap.exists
                  ? {
                      ...masterBefore,
                      refs: {
                        ...(masterBefore?.refs || {}),
                        asts: {
                          ...(masterBefore?.refs?.asts || {}),
                          id: astId,
                        },
                      },
                      serviceProvider,
                      metadata: {
                        ...(masterBefore?.metadata || {}),
                        updatedAt,
                        updatedByUid: agentUid,
                        updatedByUser: agentName,
                      },
                    }
                  : {
                      lmPcode,
                      meterNo: {
                        raw: rawMeterNo,
                        normalized: normalizedMeterNo,
                      },
                      meterType: meterType || null,
                      customerNo: null,
                      accountNo: null,
                      refs: {
                        asts: {
                          id: astId,
                        },
                        sales: {
                          id: null,
                          provider: null,
                        },
                      },
                      serviceProvider,
                      metadata: {
                        createdAt,
                        createdByUid,
                        createdByUser,
                        updatedAt,
                        updatedByUid: agentUid,
                        updatedByUser: agentName,
                      },
                    };
          ''',
          '''        const serviceProvider = trnData?.serviceProvider || {
                  id: "NAv",
                  name: "NAv",
                };

                if (masterSnap.exists) {
                  assertCanonicalMeterMasterCompatibility(masterBefore, {
                    lmPcode,
                    normalizedMeterNo,
                    meterType,
                  });
                }

                const nextMasterData = masterSnap.exists
                  ? {
                      ...masterBefore,
                      refs: {
                        ...masterBefore.refs,
                        asts: {
                          ...masterBefore.refs.asts,
                          id: astId,
                        },
                      },
                      metadata: {
                        ...masterBefore.metadata,
                        updatedAt: meterMasterAt,
                        updatedByUid: agentUid,
                        updatedByUser: agentName,
                      },
                    }
                  : buildCanonicalMeterMasterDocument({
                      lmPcode,
                      rawMeterNo,
                      normalizedMeterNo,
                      meterType,
                      astId,
                      actorUid: createdByUid || agentUid,
                      actorName: createdByUser || agentName,
                      at: meterMasterAt,
                    });
          ''',
          "discovery canonical master payload",
          )

          replace_once(
          '''        if (masterSnap.exists) {
                  tx.update(masterRef, {
                    "refs.asts.id": astId,
                    "metadata.updatedAt": updatedAt,
                    "metadata.updatedByUid": agentUid,
                    "metadata.updatedByUser": agentName,
                  });
                } else {
                  tx.set(masterRef, nextMasterData);
                }
          ''',
          '''        if (masterSnap.exists) {
                  tx.update(masterRef, {
                    "refs.asts.id": astId,
                    "metadata.updatedAt": meterMasterAt,
                    "metadata.updatedByUid": agentUid,
                    "metadata.updatedByUser": agentName,
                  });
                } else {
                  tx.create(masterRef, nextMasterData);
                }
          ''',
          "discovery strict master write",
          )

          replace_once(
          '''    const meterNoRaw = astPayload?.astData?.astNo || "";
              const meterNoNormalized = String(meterNoRaw).trim().toUpperCase();
          ''',
          '''    const meterNoRaw = astPayload?.astData?.astNo || "";
              const meterNoNormalized = normalizeMeterNo(meterNoRaw);
          ''',
          "installation canonical normalization",
          )

          replace_once(
          '''    if (validationError) return validationError;

              const premiseId = accessData?.premise?.id || "NAv";
          ''',
          '''    if (validationError) return validationError;

              if (!meterNoNormalized && hasAccess === "yes") {
                return buildFailureResult(
                  "INVALID_METER_NUMBER",
                  "Meter number is required after canonical normalization",
                );
              }

              const premiseId = accessData?.premise?.id || "NAv";
          ''',
          "installation empty normalized guard",
          )

          replace_once(
          '''    const now = new Date().toISOString();

              const safePayload = JSON.parse(
          ''',
          '''    const now = new Date().toISOString();
              const meterMasterAt = Timestamp.now();

              const safePayload = JSON.parse(
          ''',
          "installation master timestamp",
          )

          replace_once(
          '''    const finalAccessData = safePayload?.accessData || {};

              if (hasAccess === "no") {
          ''',
          '''    const finalAccessData = safePayload?.accessData || {};
              const lmPcode = String(finalAccessData?.parents?.lmPcode ?? "").trim();

              if (hasAccess === "no") {
          ''',
          "installation lmPcode",
          )

          replace_once(
          '''    const astRef = db.collection("asts").doc(trnId);
              const masterRef = db.collection("meter_master").doc(meterNoNormalized);

              const erfId = finalAccessData?.erfId || "NAv";
          ''',
          '''    const astRef = db.collection("asts").doc(trnId);
              const masterRef = db.collection("meter_master").doc(meterNoNormalized);
              const salesRef = db.collection("sales-all-meters").doc(meterNoNormalized);

              const erfId = finalAccessData?.erfId || "NAv";
          ''',
          "installation sales reference",
          )

          replace_once(
          '''      const [liveTrnSnap, liveAstSnap, liveMasterSnap, livePremiseSnap] =
                await Promise.all([
                  tx.get(trnRef),
                  tx.get(astRef),
                  tx.get(masterRef),
                  tx.get(premiseRef),
                ]);
          ''',
          '''      const [
                liveTrnSnap,
                liveAstSnap,
                liveMasterSnap,
                livePremiseSnap,
                liveSalesSnap,
              ] = await Promise.all([
                tx.get(trnRef),
                tx.get(astRef),
                tx.get(masterRef),
                tx.get(premiseRef),
                tx.get(salesRef),
              ]);
          ''',
          "installation transaction reads",
          )

          replace_once(
          '''      const existingAstId = liveMasterSnap.data()?.refs?.asts?.id || "";
              if (existingAstId && existingAstId !== trnId) {
          ''',
          '''      const existingMasterData = liveMasterSnap.exists
                ? liveMasterSnap.data() || {}
                : null;

              if (existingMasterData) {
                assertCanonicalMeterMasterCompatibility(existingMasterData, {
                  lmPcode,
                  normalizedMeterNo: meterNoNormalized,
                  meterType,
                });
              }

              const existingAstId = existingMasterData?.refs?.asts?.id || "";
              if (existingAstId && existingAstId !== trnId) {
          ''',
          "installation compatibility validation",
          )

          replace_once(
          '''      tx.create(trnRef, trnDoc);
              tx.create(astRef, astDoc);
              tx.set(
                masterRef,
                {
                  id: meterNoNormalized,
                  meterNo: meterNoNormalized,
                  meterType,
                  status: finalMeterStatus,
                  refs: {
                    asts: { id: trnId },
                    trns: { id: trnId },
                    premise: { id: premiseId },
                  },
                  parents: finalAccessData?.parents || {},
                  metadata,
                },
                { merge: true },
              );
          ''',
          '''      const nextMasterData = existingMasterData
                ? {
                    ...existingMasterData,
                    refs: {
                      ...existingMasterData.refs,
                      asts: {
                        ...existingMasterData.refs.asts,
                        id: trnId,
                      },
                    },
                    metadata: {
                      ...existingMasterData.metadata,
                      updatedAt: meterMasterAt,
                      updatedByUid: caller.uid,
                      updatedByUser: actorName,
                    },
                  }
                : buildCanonicalMeterMasterDocument({
                    lmPcode,
                    rawMeterNo: meterNoRaw,
                    normalizedMeterNo: meterNoNormalized,
                    meterType,
                    astId: trnId,
                    actorUid: caller.uid,
                    actorName,
                    at: meterMasterAt,
                  });

              const masterVisibility = deriveMasterVisibility(nextMasterData);

              tx.create(trnRef, trnDoc);
              tx.create(astRef, {
                ...astDoc,
                master: {
                  id: meterNoNormalized,
                  visibility: masterVisibility,
                },
              });

              if (existingMasterData) {
                tx.update(masterRef, {
                  "refs.asts.id": trnId,
                  "metadata.updatedAt": meterMasterAt,
                  "metadata.updatedByUid": caller.uid,
                  "metadata.updatedByUser": actorName,
                });
              } else {
                tx.create(masterRef, nextMasterData);
              }

              await syncSalesAllMetersFromMaster({
                tx,
                normalizedMeterNo: meterNoNormalized,
                masterData: nextMasterData,
                salesSnap: liveSalesSnap,
                updatedAt: now,
                updatedByUid: caller.uid,
                updatedByUser: actorName,
              });
          ''',
          "installation canonical master write",
          )

          path.write_text(text, encoding="utf-8")

      - name: Verify governed writer invariants
        shell: python
        run: |
          from pathlib import Path

          text = Path("functions/index.js").read_text(encoding="utf-8")
          required = [
              'function buildCanonicalMeterMasterDocument',
              'function assertCanonicalMeterMasterCompatibility',
              '.replace(/\\s+/g, "")',
              'tx.create(masterRef, nextMasterData)',
              '"metadata.updatedAt": meterMasterAt',
              'customerNo: ""',
              'accountNo: ""',
          ]
          forbidden = [
              'id: meterNoNormalized,\n          meterNo: meterNoNormalized',
              'refs: {\n            asts: { id: trnId },\n            trns:',
              'tx.set(\n        masterRef,',
          ]
          missing = [item for item in required if item not in text]
          present_forbidden = [item for item in forbidden if item in text]
          if missing or present_forbidden:
              raise SystemExit(
                  f"Writer invariant failure; missing={missing}; forbidden={present_forbidden}"
              )

      - name: Install function dependencies
        working-directory: functions
        run: npm ci

      - name: Check syntax
        working-directory: functions
        run: node --check index.js

      - name: Run lint
        working-directory: functions
        run: npm run lint

      - name: Commit governed fix and remove temporary workflow
        shell: bash
        run: |
          rm .github/workflows/apply-meter-master-writer-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add functions/index.js .github/workflows/apply-meter-master-writer-fix.yml
          git commit -m "fix: govern Meter Master field writers"
          git push origin HEAD:fix-meter-master-writers-20260716
