name: Web Manual Build

on:
  workflow_dispatch:
    inputs:
      build_env:
        description: "Web environment to build"
        required: true
        default: "test"
        type: choice
        options:
          - dev
          - test

permissions:
  contents: read

jobs:
  web-build:
    name: Build iREPS Web
    runs-on: ubuntu-latest

    steps:
      - name: Guard branch
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "Run this workflow from main only."
            exit 1
          fi

      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve DEV environment
        if: ${{ inputs.build_env == 'dev' }}
        run: |
          echo "VITE_APP_ENV=dev" >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_API_KEY=${{ secrets.IREPS_WEB_DEV_FIREBASE_API_KEY }}" >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.IREPS_WEB_DEV_FIREBASE_AUTH_DOMAIN }}" >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.IREPS_WEB_DEV_FIREBASE_PROJECT_ID }}" >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.IREPS_WEB_DEV_FIREBASE_STORAGE_BUCKET }}" >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.IREPS_WEB_DEV_FIREBASE_MESSAGING_SENDER_ID }}" >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_APP_ID=${{ secrets.IREPS_WEB_DEV_FIREBASE_APP_ID }}" >> "$GITHUB_ENV"
          echo "VITE_GOOGLE_MAPS_API_KEY=${{ secrets.IREPS_WEB_DEV_GOOGLE_MAPS_API_KEY }}" >> "$GITHUB_ENV"

      - name: Resolve TEST environment
        if: ${{ inputs.build_env == 'test' }}
        run: |
          echo "VITE_APP_ENV=test" >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_API_KEY=${{ secrets.IREPS_WEB_TEST_FIREBASE_API_KEY }}" >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.IREPS_WEB_TEST_FIREBASE_AUTH_DOMAIN }}" >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.IREPS_WEB_TEST_FIREBASE_PROJECT_ID }}" >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.IREPS_WEB_TEST_FIREBASE_STORAGE_BUCKET }}" >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.IREPS_WEB_TEST_FIREBASE_MESSAGING_SENDER_ID }}" >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_APP_ID=${{ secrets.IREPS_WEB_TEST_FIREBASE_APP_ID }}" >> "$GITHUB_ENV"
          echo "VITE_GOOGLE_MAPS_API_KEY=${{ secrets.IREPS_WEB_TEST_GOOGLE_MAPS_API_KEY }}" >> "$GITHUB_ENV"

      - name: Verify selected web config
        run: npm run ci:verify-web-env -- "${{ inputs.build_env }}"

      - name: Run lint advisory
        continue-on-error: true
        run: npm run lint:web

      - name: Build web app
        run: npm run build:${{ inputs.build_env }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v5
        with:
          name: ireps-web-${{ inputs.build_env }}-dist
          path: dist
          if-no-files-found: error
          retention-days: 7
