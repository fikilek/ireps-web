name: Run Meter Master Writer Fix

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-validate-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout delivery branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Execute governed patch embedded in preparation workflow
        shell: python
        run: |
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/apply-meter-master-writer-fix.yml')
          lines = workflow.read_text(encoding='utf-8').splitlines()

          start_marker = '      - name: Patch canonical Meter Master writers'
          next_marker = '      - name: Verify governed writer invariants'
          start = lines.index(start_marker)
          end = lines.index(next_marker)
          run_index = next(
              index for index in range(start, end)
              if lines[index].strip() == 'run: |'
          )
          script_lines = lines[run_index + 1:end]
          script = textwrap.dedent('\n'.join(script_lines))
          exec(compile(script, str(workflow), 'exec'), {'__name__': '__main__'})

      - name: Verify governed writer invariants
        shell: python
        run: |
          from pathlib import Path

          text = Path('functions/index.js').read_text(encoding='utf-8')
          required = [
              'function buildCanonicalMeterMasterDocument',
              'function assertCanonicalMeterMasterCompatibility',
              '.replace(/\\s+/g, "")',
              'tx.create(masterRef, nextMasterData)',
              '"metadata.updatedAt": meterMasterAt',
              'customerNo: ""',
              'accountNo: ""',
          ]
          forbidden = [
              'id: meterNoNormalized,\n          meterNo: meterNoNormalized',
              'refs: {\n            asts: { id: trnId },\n            trns:',
              'tx.set(\n        masterRef,',
          ]
          missing = [item for item in required if item not in text]
          present_forbidden = [item for item in forbidden if item in text]
          if missing or present_forbidden:
              raise SystemExit(
                  f'Writer invariant failure; missing={missing}; forbidden={present_forbidden}'
              )

      - name: Install function dependencies
        working-directory: functions
        run: npm ci

      - name: Check function syntax
        working-directory: functions
        run: node --check index.js

      - name: Run function lint
        working-directory: functions
        run: npm run lint

      - name: Commit validated writer fix
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        shell: bash
        run: |
          rm .github/workflows/apply-meter-master-writer-fix.yml
          rm .github/workflows/run-meter-master-writer-fix-on-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add functions/index.js .github/workflows/
          git commit -m "fix: govern Meter Master field writers"
          git push origin "HEAD:${HEAD_BRANCH}"
